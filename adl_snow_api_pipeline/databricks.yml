# This is a Databricks asset bundle definition for adl_snow_api_pipeline.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: adl_snow_api_pipeline
  uuid: 4f7b88c8-9665-49e7-8371-73118a457152

include:
  - resources/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-f5e77e6e-a946.cloud.databricks.com
    variables:
      catalog: zeyodb
      schema: dev
  prod:
    mode: production
    workspace:
      host: https://dbc-f5e77e6e-a946.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/meenakshi.gsekar@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/meenakshi.gsekar@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: zeyodb
      schema: prod
    permissions:
      - user_name: meenakshi.gsekar@gmail.com
        level: CAN_MANAGE
