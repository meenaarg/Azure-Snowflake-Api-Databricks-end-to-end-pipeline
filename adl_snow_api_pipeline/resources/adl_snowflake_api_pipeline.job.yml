resources:
  jobs:
    adl_snowflake_api_pipeline:
      name: ADL-Snowflake-Api pipeline
      tasks:
        - task_key: ADL
          disabled: false
          email_notifications: {}
          environment_key: Default
          notebook_task:
            notebook_path: ../src/ADL.ipynb
            source: WORKSPACE
          run_if: ALL_SUCCESS
          timeout_seconds: 0
          webhook_notifications: {}
        - task_key: Snow
          depends_on:
            - task_key: ADL
          disabled: false
          email_notifications: {}
          notebook_task:
            notebook_path: ../src/SNOWFLAKE.ipynb
            source: WORKSPACE
          run_if: ALL_SUCCESS
          timeout_seconds: 0
          webhook_notifications: {}
        - task_key: API
          depends_on:
            - task_key: Snow
          disabled: false
          email_notifications: {}
          notebook_task:
            notebook_path: ../src/WEB API.ipynb
            source: WORKSPACE
          run_if: ALL_SUCCESS
          timeout_seconds: 0
          webhook_notifications: {}
        - task_key: Master
          depends_on:
            - task_key: API
          disabled: false
          email_notifications: {}
          notebook_task:
            notebook_path: ../src/MASTER.ipynb
            source: WORKSPACE
          run_if: ALL_SUCCESS
          timeout_seconds: 0
      email_notifications:
        no_alert_for_skipped_runs: false
      environments:
        - environment_key: Default
          spec:
            environment_version: "5"
      max_concurrent_runs: 1
      performance_target: PERFORMANCE_OPTIMIZED
      queue:
        enabled: true
      timeout_seconds: 0
      webhook_notifications: {}
